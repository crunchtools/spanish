<VirtualHost *:80>
    ServerName spanish.crunchtools.com
    DocumentRoot /var/www/html/spanish.crunchtools.com

    <Directory /var/www/html/spanish.crunchtools.com>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback — serve index.html for all non-file routes
        FallbackResource /index.html
    </Directory>

    # MIME types for 3D assets
    AddType model/gltf-binary .glb
    AddType model/gltf+json .gltf

    # Cache static assets
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|html|glb|gltf|woff2)$">
        Header set Cache-Control "max-age=2592000, public, immutable"
    </FilesMatch>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json model/gltf+json
    </IfModule>

    ErrorLog /var/log/httpd/spanish.crunchtools.com-error.log
    CustomLog /var/log/httpd/spanish.crunchtools.com-access.log combined
</VirtualHost>
